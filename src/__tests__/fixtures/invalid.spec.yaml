feature: invalid module
code: invalid
description: |
  YAML с не закавыченной строкой, содержащей `: ` —
  парсер ломается, потому что ": " внутри значения
  интерпретируется как начало вложенного маппинга.

specs-unit:
  Регистрация:
    - assert: Сервер шлёт comment-строку (`: keepalive`) каждые 15 секунд
